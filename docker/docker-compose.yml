version: "3.9"

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scraper:
    build: .
    command: python scrapers/run_all.py
    env_file: .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      SCRAPE_INTERVAL_MINUTES: "30"
